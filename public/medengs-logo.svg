<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 700" width="3000" height="700">
  <defs>
    <!-- Split at ~36% — M,E,D darker teal | E,N,G,S bright cyan -->
    <linearGradient id="medengsSplit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#4DB8B8"/>
      <stop offset="0.43" stop-color="#4DB8B8"/>
      <stop offset="0.44" stop-color="#00E5CC"/>
      <stop offset="1"   stop-color="#00E5CC"/>
    </linearGradient>
    <style>
      .medengs-text {
        font-family: "Arial Black", "Arial Bold", "Helvetica Neue", sans-serif;
        font-weight: 900;
        font-size: 340px;
        letter-spacing: -14px;
        fill: url(#medengsSplit);
      }
    </style>
  </defs>

  <!-- Transparent background -->
  <rect width="3000" height="700" fill="none"/>

  <!--
    MEDENGS centered in 3000-wide viewBox.
    text ~1980px wide → start x ≈ 510 to center
  -->
  <text class="medengs-text" x="510" y="435"
        text-anchor="start" dominant-baseline="auto">
    MEDENGS
  </text>
</svg>
